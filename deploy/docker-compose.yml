services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: todolist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54340:5432"
    volumes:
      - todolist_runtime_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todolist"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: postgres:16
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ../backend/migrations:/migrations:ro
    command:
      - sh
      - -c
      - |
        existing_tables=$$(psql -h db -U postgres -d todolist -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_name IN ('users', 'todo_lists', 'tasks', 'tags', 'task_tags')")
        if [ "$$existing_tables" = "5" ]; then
          echo "migrations already applied"
          exit 0
        fi
        if [ "$$existing_tables" != "0" ]; then
          echo "partial schema detected; reset the runtime database volume before rerunning migrations" >&2
          exit 1
        fi
        for migration in /migrations/*.up.sql; do
          psql -v ON_ERROR_STOP=1 -h db -U postgres -d todolist -f "$$migration"
        done
    restart: "no"

  api:
    build:
      context: ../backend
    image: todolist-api:local
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      API_ADDR: :8080
      APP_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/todolist?sslmode=disable
      JWT_SECRET: local-runtime-secret
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ../web
      args:
        VITE_API_URL: http://localhost:8080
    image: todolist-web:local
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  loki:
    image: grafana/loki:3.5.2
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - todolist_loki_data:/loki

  alloy:
    image: grafana/alloy:v1.10.2
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  grafana:
    image: grafana/grafana:12.1.0
    depends_on:
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - todolist_grafana_data:/var/lib/grafana

  validation-db:
    image: postgres:16
    profiles: ["validation"]
    environment:
      POSTGRES_DB: todolist_validation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54339:5432"
    volumes:
      - todolist_validation_db:/var/lib/postgresql/data
      - ../backend/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todolist_validation"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  todolist_runtime_db:
  todolist_validation_db:
  todolist_loki_data:
  todolist_grafana_data:
